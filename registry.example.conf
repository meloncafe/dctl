# dctl registry  —  copy to ~/.config/dctl/registry.conf and edit per node.
#
# This file maps service names to their compose project. It is NOT committed
# (each node owns its own copy), because services differ from node to node.
#
# Fields per [service] section:
#   path       (required)  compose project directory. ~ allowed for local.
#   node       (optional)  ssh host alias (~/.ssh/config). Omit = local node.
#   files      (optional)  space-separated compose files. Omit = compose default.
#   pre_up     (optional)  shell command run before 'up' (in project dir).
#   post_up    (optional)  shell command run after  'up'.
#   pre_down   (optional)  shell command run before 'down'.
#   post_down  (optional)  shell command run after  'down'.
#
# Hooks run in the same context as the service: locally for local services,
# over ssh for remote ones.
#
# !! SECURITY: hook values are executed verbatim by your shell (via eval for
#    local, and over ssh for remote). Only put commands you trust here. Treat
#    this file like a shell script you are about to run.

[web]
path    = ~/stacks/web
files   = docker-compose.yml

[db]
path     = ~/stacks/db
files    = docker-compose.yml
post_up  = echo '>> db is up; run migrations if needed'

# --- multiple compose files (base + override) ---
[api]
path  = ~/stacks/api
files = docker-compose.yml docker-compose.prod.yml

# --- remote example (controls a service on another host over ssh) ---
# [worker]
# node  = my-other-host          # must exist as a Host in ~/.ssh/config
# path  = /home/user/worker
# files = docker-compose.yml
